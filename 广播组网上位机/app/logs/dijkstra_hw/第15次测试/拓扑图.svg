<text x="348" y="113" font-size="12" font-family="Arial, sans-serif" fill="#374151">-66~-75</text>
<line x1="438" y1="108" x2="472" y2="108" stroke="#c53030" stroke-width="4" stroke-linecap="round"/>
<text x="480" y="113" font-size="12" font-family="Arial, sans-serif" fill="#374151">-76~-85</text>
<line x1="570" y1="108" x2="604" y2="108" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
<text x="612" y="113" font-size="12" font-family="Arial, sans-serif" fill="#374151">route</text>
