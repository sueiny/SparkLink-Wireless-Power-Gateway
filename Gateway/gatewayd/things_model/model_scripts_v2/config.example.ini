# ThingsKit 物模型同步工具配置文件
# 将此文件复制为 config.ini 并填入实际值

[thingskit]
# ThingsKit平台地址（从gateway_config.json自动读取）
# base_url = https://thingskit.aiotcomm.com.cn

# 登录用户名（从gateway_config.json自动读取）
# username = admin

# 登录密码（建议在此处配置，或使用 --password 参数）
# password = your_password_here

[sync]
# 物模型目录（默认为 gatewayd/things_model）
# model_dir = things_model

# 预览模式：true=只显示不执行，false=实际执行
dry_run = false
